<svg
  width="1280"
  height="640"
  viewBox="0 0 1280 640"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">datoon banner</title>
  <desc id="desc">Clean datoon banner with safe text layout and benchmark highlights.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#041525" />
      <stop offset="0.52" stop-color="#0B3B5B" />
      <stop offset="1" stop-color="#13B8A5" />
    </linearGradient>

    <radialGradient
      id="glowLeft"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(190 560) rotate(-16) scale(300 220)"
    >
      <stop stop-color="#22D3EE" stop-opacity="0.35" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>

    <radialGradient
      id="glowRight"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1080 120) rotate(176) scale(280 250)"
    >
      <stop stop-color="#99F6E4" stop-opacity="0.30" />
      <stop offset="1" stop-color="#99F6E4" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="badge" x1="120" y1="92" x2="332" y2="138" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.10" />
    </linearGradient>

    <linearGradient id="card" x1="120" y1="404" x2="1140" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.20" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.09" />
    </linearGradient>

    <linearGradient id="bars" x1="942" y1="145" x2="1168" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5DE2FF" stop-opacity="0.8" />
      <stop offset="1" stop-color="#99F6E4" stop-opacity="0.55" />
    </linearGradient>

    <filter
      id="shadow"
      x="70"
      y="70"
      width="1140"
      height="500"
      filterUnits="userSpaceOnUse"
      color-interpolation-filters="sRGB"
    >
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020E1A" flood-opacity="0.34" />
    </filter>
  </defs>

  <rect x="8" y="8" width="1264" height="624" rx="28" fill="url(#bg)" />
  <rect x="8" y="8" width="1264" height="624" rx="28" stroke="#D9F1FF" stroke-opacity="0.18" />

  <ellipse cx="190" cy="560" rx="300" ry="220" fill="url(#glowLeft)" />
  <ellipse cx="1080" cy="120" rx="280" ry="250" fill="url(#glowRight)" />

  <g opacity="0.36">
    <path d="M940 178H1164" stroke="#CFEAFF" stroke-opacity="0.28" />
    <path d="M940 218H1164" stroke="#CFEAFF" stroke-opacity="0.28" />
    <path d="M940 258H1164" stroke="#CFEAFF" stroke-opacity="0.28" />
    <rect x="952" y="206" width="32" height="52" rx="8" fill="url(#bars)" />
    <rect x="1002" y="184" width="32" height="74" rx="8" fill="url(#bars)" />
    <rect x="1052" y="160" width="32" height="98" rx="8" fill="url(#bars)" />
    <rect x="1102" y="136" width="32" height="122" rx="8" fill="url(#bars)" />
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="88" width="220" height="52" rx="26" fill="url(#badge)" />
    <rect x="120" y="88" width="220" height="52" rx="26" stroke="#E6F5FF" stroke-opacity="0.24" />

    <rect x="120" y="404" width="320" height="152" rx="20" fill="url(#card)" />
    <rect x="120" y="404" width="320" height="152" rx="20" stroke="#E6F5FF" stroke-opacity="0.28" />

    <rect x="470" y="404" width="320" height="152" rx="20" fill="url(#card)" />
    <rect x="470" y="404" width="320" height="152" rx="20" stroke="#E6F5FF" stroke-opacity="0.28" />

    <rect x="820" y="404" width="320" height="152" rx="20" fill="url(#card)" />
    <rect x="820" y="404" width="320" height="152" rx="20" stroke="#E6F5FF" stroke-opacity="0.28" />
  </g>

  <text
    x="142"
    y="114"
    fill="#EAF5FF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="19"
    font-weight="600"
    dominant-baseline="middle"
    alignment-baseline="middle"
  >
    smart TOON gateway
  </text>

  <text
    x="120"
    y="246"
    fill="#F8FCFF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="114"
    font-weight="700"
    letter-spacing="-1.1"
  >
    datoon
  </text>

  <text
    x="120"
    y="314"
    fill="#D5EAF8"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="58"
    font-weight="500"
  >
    convert structured JSON to TOON
  </text>

  <text
    x="120"
    y="372"
    fill="#D5EAF8"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="58"
    font-weight="500"
  >
    only when it really saves tokens
  </text>

  <text
    x="146"
    y="442"
    fill="#BFDDEF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="500"
  >
    auto mode avg savings
  </text>
  <text
    x="146"
    y="533"
    fill="#FFFFFF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="74"
    font-weight="700"
  >
    28.1%
  </text>

  <text
    x="496"
    y="442"
    fill="#BFDDEF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="500"
  >
    forced TOON avg
  </text>
  <text
    x="496"
    y="533"
    fill="#FFFFFF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="74"
    font-weight="700"
  >
    26.8%
  </text>

  <text
    x="846"
    y="442"
    fill="#BFDDEF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="500"
  >
    benchmark payloads
  </text>
  <text
    x="846"
    y="533"
    fill="#FFFFFF"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-size="74"
    font-weight="700"
  >
    5
  </text>
</svg>
